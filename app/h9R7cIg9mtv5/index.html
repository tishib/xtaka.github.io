<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom right, #eff6ff, #e0e7ff);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 2rem;
        }

        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            resize: vertical;
            margin-bottom: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
        }

        button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-sort {
            flex: 1;
            background: #16a34a;
            color: white;
        }

        .btn-sort:hover {
            background: #15803d;
        }

        .btn-toggle {
            background: #4b5563;
            color: white;
            min-width: 140px;
        }

        .btn-toggle:hover {
            background: #374151;
        }

        .icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <textarea id="textInput" rows="10" placeholder="テキストを入力（1行に1つ）...">Apple
Banana
Cherry
Date</textarea>
            <div class="button-group">
                <button class="btn-sort" onclick="sortTexts()">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                    ソート実行
                </button>
                <button class="btn-toggle" onclick="toggleSortOrder()">
                    <span id="sortOrderText">昇順 (A→Z)</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let sortOrder = 'asc';

        function sortTexts() {
            const textarea = document.getElementById('textInput');
            const lines = textarea.value.split('\n').filter(line => line.trim());
            
            const sorted = lines.sort((a, b) => {
                const compareA = a.trim().toLowerCase();
                const compareB = b.trim().toLowerCase();
                if (sortOrder === 'asc') {
                    return compareA.localeCompare(compareB);
                } else {
                    return compareB.localeCompare(compareA);
                }
            });
            
            textarea.value = sorted.join('\n');
        }

        function toggleSortOrder() {
            sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            const sortOrderText = document.getElementById('sortOrderText');
            sortOrderText.textContent = sortOrder === 'asc' ? '昇順 (A→Z)' : '降順 (Z→A)';
        }
    </script>
</body>
</html>
