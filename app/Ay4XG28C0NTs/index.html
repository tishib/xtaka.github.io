<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気</title>
  <style>
    :root {
      --bg: #f5f8fc;
      --fg: #1a2a3a;
      --accent: #1a6acc;
      --dim: #7a9ab0;
      --sep: #d0dde8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1.5rem 1rem;
      transition: background 1.5s;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        transparent 0, transparent 3px,
        rgba(0,0,0,.02) 3px, rgba(0,0,0,.02) 4px
      );
      pointer-events: none;
      z-index: 999;
    }
    .frame {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--accent);
      transition: border-color 1.5s;
    }
    .row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .75rem;
      padding: .5rem 1rem;
    }
    .area-control {
      display: flex;
      align-items: center;
      gap: .45rem;
      min-width: 0;
    }
    .city  { color: var(--accent); font-size: 1rem; letter-spacing: .1em; }
    .clock { color: var(--dim); font-size: .8rem; }
    .pref-select {
      min-width: 8.5rem;
      max-width: 11rem;
      border: 1px solid var(--sep);
      border-radius: 0;
      background: var(--bg);
      color: var(--fg);
      font: inherit;
      font-size: .82rem;
      padding: .22rem .35rem;
      transition: background 1.5s, border-color 1.5s;
    }
    .pref-select:focus {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }
    hr.div { border: none; border-top: 1px solid var(--accent); margin: 0; }
    .current {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      padding: 1rem;
      border-top: 1px solid var(--sep);
    }
    pre.icon {
      color: var(--accent);
      font-size: .7rem;
      line-height: 1.55;
      flex-shrink: 0;
      margin: 0;
    }
    .info-desc  { font-size: .85rem; margin-bottom: .4rem; line-height: 1.4; }
    .info-temp  { font-size: 2rem; color: var(--accent); line-height: 1; }
    .info-range { font-size: .72rem; color: var(--dim); margin-top: .3rem; }
    .sec {
      font-size: .68rem;
      color: var(--accent);
      letter-spacing: .12em;
      padding: .4rem 1rem .2rem;
      border-top: 1px solid var(--accent);
    }
    .pops { padding: .4rem .75rem .8rem; overflow-x: auto; }
    .pops-inner { display: flex; gap: .35rem; min-width: max-content; }
    .pc     { text-align: center; min-width: 34px; }
    .pc-t   { font-size: .58rem; color: var(--dim); }
    .pc-v   { font-size: .7rem;  color: var(--fg);  margin: .12rem 0; }
    .pc-b   { font-size: .62rem; color: var(--accent); letter-spacing: -.5px; }
    .weekly { padding: .4rem .75rem .8rem; }
    .wr {
      display: grid;
      grid-template-columns: 2ch 2ch 1fr auto auto;
      gap: .4rem;
      align-items: center;
      padding: .28rem 0;
      font-size: .78rem;
      border-bottom: 1px dashed var(--sep);
    }
    .wr:last-child { border-bottom: none; }
    .wd { color: var(--accent); }
    .ws { text-align: center; }
    .wl { color: var(--dim); font-size: .62rem; overflow: hidden; white-space: nowrap; }
    .wt { color: var(--fg);     font-size: .7rem; white-space: nowrap; }
    .wp { color: var(--accent); font-size: .7rem; white-space: nowrap; }
    .foot {
      padding: .3rem 1rem;
      font-size: .58rem;
      color: var(--dim);
      border-top: 1px solid var(--sep);
    }
    .msg { padding: 2rem 1rem; text-align: center; color: var(--dim); }

    @keyframes sun-pulse {
      0%, 100% { filter: drop-shadow(0 0 3px var(--accent)); transform: scale(1); }
      50%       { filter: drop-shadow(0 0 10px var(--accent)); transform: scale(1.06); }
    }
    @keyframes cloud-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    @keyframes rain-drip {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(4px); opacity: .8; }
    }
    @keyframes snow-drift {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(3px, -2px); }
      66%       { transform: translate(-3px, 2px); }
    }
    @keyframes lightning-flash {
      0%, 78%, 100%  { filter: brightness(1); }
      80%, 84%        { filter: brightness(1.9) drop-shadow(0 0 8px var(--accent)); }
      82%, 87%        { filter: brightness(.5); }
    }
    pre.icon[data-w="sunny"]        { animation: sun-pulse 2.5s ease-in-out infinite; }
    pre.icon[data-w="partlyCloudy"] { animation: cloud-float 3s ease-in-out infinite; }
    pre.icon[data-w="cloudy"]       { animation: cloud-float 4.5s ease-in-out infinite; }
    pre.icon[data-w="rainy"]        { animation: rain-drip 1.4s ease-in-out infinite; }
    pre.icon[data-w="snowy"]        { animation: snow-drift 4s ease-in-out infinite; }
    pre.icon[data-w="thunder"]      { animation: lightning-flash 3.5s linear infinite; }
  </style>
</head>
<body>
<div class="frame">
  <div class="row-header">
    <div class="area-control">
      <span class="city" id="city-label">[ -- ]</span>
      <select class="pref-select" id="pref-select" aria-label="都道府県"></select>
    </div>
    <span class="clock" id="clock">--:--</span>
  </div>
  <hr class="div">
  <div id="body" class="msg">都道府県を選択してください</div>
</div>

<script>
// 都道府県 → 気象庁 office コード
const PREFS = [
  ['016000', '北海道'],
  ['020000', '青森県'],
  ['030000', '岩手県'],
  ['040000', '宮城県'],
  ['050000', '秋田県'],
  ['060000', '山形県'],
  ['070000', '福島県'],
  ['080000', '茨城県'],
  ['090000', '栃木県'],
  ['100000', '群馬県'],
  ['110000', '埼玉県'],
  ['120000', '千葉県'],
  ['130000', '東京都'],
  ['140000', '神奈川県'],
  ['150000', '新潟県'],
  ['160000', '富山県'],
  ['170000', '石川県'],
  ['180000', '福井県'],
  ['190000', '山梨県'],
  ['200000', '長野県'],
  ['210000', '岐阜県'],
  ['220000', '静岡県'],
  ['230000', '愛知県'],
  ['240000', '三重県'],
  ['250000', '滋賀県'],
  ['260000', '京都府'],
  ['270000', '大阪府'],
  ['280000', '兵庫県'],
  ['290000', '奈良県'],
  ['300000', '和歌山県'],
  ['310000', '鳥取県'],
  ['320000', '島根県'],
  ['330000', '岡山県'],
  ['340000', '広島県'],
  ['350000', '山口県'],
  ['360000', '徳島県'],
  ['370000', '香川県'],
  ['380000', '愛媛県'],
  ['390000', '高知県'],
  ['400000', '福岡県'],
  ['410000', '佐賀県'],
  ['420000', '長崎県'],
  ['430000', '熊本県'],
  ['440000', '大分県'],
  ['450000', '宮崎県'],
  ['460100', '鹿児島県'],
  ['471000', '沖縄県'],
];

const ICONS = {
  sunny:        ['   \\   /  ', '    .-.   ', ' --(   )--', "    '-'   ", '   /   \\  '],
  partlyCloudy: ['  \\  /    ', '   .--.   ', '  (    ).  ', ' (______) ', '          '],
  cloudy:       ['          ', '  .----.  ', ' (      ) ', ' (______) ', '          '],
  rainy:        ['  .----.  ', ' (      ) ', ' (______) ', "  ' ' ' ' ", "   ' ' '  "],
  snowy:        ['  .----.  ', ' (      ) ', ' (______) ', '  *  *  * ', '   *  *   '],
  thunder:      ['  .----.  ', ' (      ) ', ' (______) ', '    \\⚡/  ', "   ' ' '  "],
};
const SYM = { sunny:'☀', partlyCloudy:'⛅', cloudy:'☁', rainy:'🌧', snowy:'❄', thunder:'⛈' };
const TXT = { sunny:'晴れ', partlyCloudy:'晴れ/曇り', cloudy:'曇り', rainy:'雨', snowy:'雪', thunder:'雷雨' };
const THEMES = {
  sunny:        ['#fffdf2', '#c47800', '#a07848', '#f0e0b8'],
  partlyCloudy: ['#f4f8ff', '#1a68a0', '#6a8a9a', '#c8dce8'],
  cloudy:       ['#f6f7f9', '#445566', '#7a8a99', '#ccd4dc'],
  rainy:        ['#f0f4ff', '#1a55cc', '#4a6090', '#c0cce8'],
  snowy:        ['#f4faff', '#2277aa', '#5a8099', '#c8dce8'],
  thunder:      ['#f7f4ff', '#6633bb', '#7055aa', '#d8c8ee'],
};

function cat(code) {
  const c = +code || 0;
  if (c >= 400) return 'snowy';
  if (c >= 320) return 'thunder';
  if (c >= 300) return 'rainy';
  if (c >= 200) return (c === 201 || c === 202 || c === 211) ? 'partlyCloudy' : 'cloudy';
  if ([101, 102, 110, 111].includes(c)) return 'partlyCloudy';
  return 'sunny';
}

function applyTheme(k) {
  const [bg, ac, dm, sp] = THEMES[k] || THEMES.cloudy;
  const r = document.documentElement;
  r.style.setProperty('--bg', bg);
  r.style.setProperty('--accent', ac);
  r.style.setProperty('--dim', dm);
  r.style.setProperty('--sep', sp);
  document.body.style.background = bg;
}

function bar(p) {
  const n = Math.round((+p || 0) / 25);
  return '█'.repeat(n) + '░'.repeat(4 - n);
}

function formatWeatherSummary(desc, code) {
  const fallback = `${TXT[cat(code)] || '天気'}の予報です。`;
  if (!desc) return fallback;

  const normalized = desc
    .replace(/\s+/g, ' ')
    .replace(/くもり/g, '曇り')
    .trim();
  if (!normalized) return fallback;

  const timeWords = [
    '未明', '明け方', '朝', '昼前', '昼過ぎ', '夕方', '夜',
    '朝晩', '午前', '午後', '日中'
  ];
  const weatherWords = ['晴れ', '曇り', '雨', '雪', '雷雨', 'みぞれ'];
  const connectors = ['のち', '時々', '一時'];
  const tokens = normalized.split(' ');
  const clauses = [[]];

  tokens.forEach(token => {
    if (token === '所により') {
      clauses.push([token]);
      return;
    }

    const clause = clauses[clauses.length - 1];
    const prev = clause[clause.length - 1];

    if (timeWords.includes(token) && weatherWords.includes(prev)) {
      clause.push('、', token);
    } else if (weatherWords.includes(token) && timeWords.includes(prev)) {
      clause.push('は', token);
    } else if (weatherWords.includes(token) && prev === 'まで') {
      clause.push(token);
    } else if (
      weatherWords.includes(token) &&
      prev &&
      !connectors.includes(prev) &&
      prev !== 'から' &&
      prev !== 'は' &&
      prev !== '所により'
    ) {
      clause.push('、', token);
    } else if (token === 'で') {
      clause.push('、');
    } else {
      clause.push(token);
    }
  });

  const sentences = clauses
    .map(parts => parts.join('').replace(/、+/g, '、').replace(/^、|、$/g, ''))
    .filter(Boolean)
    .map((text, i) => {
      if (text.includes('雷を伴う')) {
        return text.replace(/雷を伴う$/, '雷を伴うことがあります');
      }
      if (text.startsWith('所により')) {
        return `${text}の可能性があります`;
      }
      return i === 0 ? `${text}の予報です` : text;
    });

  return sentences.length ? `${sentences.join('。')}。` : fallback;
}

function relHours(iso) {
  if (!iso) return '--h';
  const h = Math.round((new Date(iso) - Date.now()) / 3600000);
  return '+' + h + 'h';
}

function weekDay(iso) {
  const d = new Date(iso);
  const jst = new Date(d.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  return '日月火水木金土'[jst.getDay()];
}

function updateClock() {
  const el = document.getElementById('clock');
  if (!el) return;
  const jst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const day = '日月火水木金土'[jst.getDay()];
  el.textContent = `${day} ${String(jst.getHours()).padStart(2, '0')}:${String(jst.getMinutes()).padStart(2, '0')}`;
}

async function loadWeather(prefCode, fallbackName) {
  document.getElementById('city-label').textContent = `[ ${fallbackName} ]`;
  document.getElementById('body').innerHTML =
    `<div class="msg">データ取得中...<br><br>&gt; jma.go.jp/bosai/forecast/${prefCode}</div>`;

  try {
    const data = await fetch(
      `https://www.jma.go.jp/bosai/forecast/data/forecast/${prefCode}.json`
    ).then(r => { if (!r.ok) throw Error('HTTP ' + r.status); return r.json(); });

    const [wS, pS, tS] = data[0].timeSeries;
    const wA = wS.areas[0];
    const pA = pS.areas[0];
    const tA = tS.areas[0];

    const todayCode = wA.weatherCodes?.[0] || '200';
    const k = cat(todayCode);
    const todayDesc = formatWeatherSummary(wA.weathers?.[0] || '', todayCode);
    applyTheme(k);

    document.getElementById('city-label').textContent = `[ ${wA.area.name} ]`;

    // 今日の最低・最高気温（気象庁は 00:00 = 最低, 09:00 = 最高 で格納）
    const todayJST = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
    let lo = '--', hi = '--';
    (tS.timeDefines || []).forEach((t, i) => {
      const v = tA.temps?.[i];
      if (v === '' || v == null) return;
      if (t.slice(0, 10) !== todayJST) return;
      if (+t.slice(11, 13) < 6) lo = v; else hi = v;
    });

    const pops   = pA.pops || [];
    const pTimes = pS.timeDefines || [];

    const [wkW, wkT] = data[1].timeSeries;
    const wkA  = wkW.areas[0];
    const wkTA = wkT.areas[0];
    const wkDays  = wkW.timeDefines || [];
    const wkCodes = wkA.weatherCodes || [];
    const wkPops  = wkA.pops || [];
    const wkMin   = wkTA?.tempsMin || [];
    const wkMax   = wkTA?.tempsMax || [];

    const showTemp  = hi !== '--' ? hi : lo;
    const iconLines = (ICONS[k] || ICONS.cloudy).join('\n');

    document.getElementById('body').innerHTML = `
      <div class="current">
        <pre class="icon" data-w="${k}">${iconLines}</pre>
        <div>
          <div class="info-desc">${todayDesc}</div>
          <div class="info-temp">${showTemp}°</div>
          <div class="info-range">▼ ${lo}°　▲ ${hi}°</div>
        </div>
      </div>
      <div class="sec">── 降水確率　6時間毎</div>
      <div class="pops">
        <div class="pops-inner">
          ${pops.slice(0, 8).map((p, i) => `
            <div class="pc">
              <div class="pc-t">${relHours(pTimes[i])}</div>
              <div class="pc-v">${p}%</div>
              <div class="pc-b">${bar(p)}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="sec">── 週間予報</div>
      <div class="weekly">
        ${wkDays.map((t, i) => {
          const c = cat(wkCodes[i] || '200');
          return `<div class="wr">
            <span class="wd">${weekDay(t)}</span>
            <span class="ws">${SYM[c]}</span>
            <span class="wl">${TXT[c]}</span>
            <span class="wt">${wkMin[i] || '--'}/${wkMax[i] || '--'}°</span>
            <span class="wp">${wkPops[i] || '--'}%</span>
          </div>`;
        }).join('')}
      </div>
      <div class="foot">&gt; 気象庁　&gt; ${new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })} 更新</div>
    `;

  } catch (e) {
    document.getElementById('body').innerHTML =
      `<div class="msg" style="color:#f44">エラー: ${e.message}</div>`;
  }
}

function selectedPref(code) {
  return PREFS.find(([prefCode]) => prefCode === code) || PREFS.find(([prefCode]) => prefCode === '130000') || PREFS[0];
}

function setupPrefSelect() {
  const select = document.getElementById('pref-select');
  select.innerHTML = PREFS
    .map(([code, name]) => `<option value="${code}">${name}</option>`)
    .join('');

  select.addEventListener('change', () => {
    const [code, name] = selectedPref(select.value);
    localStorage.setItem('weather-pref-code', code);
    loadWeather(code, name);
  });

  const savedCode = localStorage.getItem('weather-pref-code');
  const [code, name] = selectedPref(savedCode);
  select.value = code;
  loadWeather(code, name);
}

function init() {
  updateClock();
  setInterval(updateClock, 30000);
  setupPrefSelect();
}

init();
</script>
</body>
</html>
